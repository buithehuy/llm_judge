<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM-as-a-Judge — Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a28;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #a78bfa;
      --success: #22d3a5;
      --danger: #f87171;
      --text: #e2e2f0;
      --muted: #6b6b8a;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── NAV ── */
    nav {
      width: 100%;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(17,17,24,0.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
    .logo span { color: var(--accent2); }
    .nav-user { display: flex; align-items: center; gap: 12px; }
    #userBadge {
      font-size: .82rem; color: var(--muted);
      background: var(--surface2); padding: 6px 14px;
      border-radius: 99px; border: 1px solid var(--border);
    }
    #logoutBtn {
      font-size: .82rem; cursor: pointer; background: none;
      border: 1px solid var(--border); color: var(--muted);
      padding: 6px 14px; border-radius: 99px; transition: all .2s;
    }
    #logoutBtn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── MAIN WRAPPER ── */
    main {
      width: 100%; max-width: 520px;
      padding: 48px 20px;
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ── HERO TEXT ── */
    .hero { text-align: center; margin-bottom: 36px; }
    .hero h1 {
      font-size: 2rem; font-weight: 700; letter-spacing: -0.6px;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .hero p { color: var(--muted); font-size: .9rem; line-height: 1.6; }

    /* ── CARD ── */
    .card {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px; box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 4px;
      background: var(--surface2); border-radius: 10px;
      padding: 4px; margin-bottom: 28px;
    }
    .tab {
      flex: 1; padding: 9px; border: none; background: none;
      color: var(--muted); border-radius: 8px; cursor: pointer;
      font-size: .9rem; font-weight: 500; transition: all .2s;
    }
    .tab.active { background: var(--accent); color: #fff; }

    /* ── FORM ── */
    .form-group { margin-bottom: 18px; }
    label { font-size: .82rem; color: var(--muted); margin-bottom: 6px; display: block; }
    input {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 11px 14px; color: var(--text); font-size: .9rem;
      transition: border-color .2s; outline: none; font-family: inherit;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; letter-spacing: .2px; transition: opacity .2s, transform .15s;
    }
    .btn:hover { opacity: .9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .alert {
      padding: 11px 14px; border-radius: 10px;
      font-size: .85rem; margin-bottom: 18px; display: none;
    }
    .alert.error { background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.3); color: var(--danger); }
    .alert.success { background: rgba(34,211,165,.12); border: 1px solid rgba(34,211,165,.3); color: var(--success); }

    /* ── DASHBOARD ── */
    #dashboard { width: 100%; max-width: 860px; padding: 40px 20px; }
    .dash-header { margin-bottom: 28px; }
    .dash-header h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .dash-header p { color: var(--muted); font-size: .88rem; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media(max-width:640px) { .grid2 { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .stat-card .val { font-size: 2rem; font-weight: 700; color: var(--accent2); }
    .stat-card .lbl { font-size: .8rem; color: var(--muted); margin-top: 2px; }

    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 14px; }

    /* Submit Form */
    .submit-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 24px;
    }
    select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px; color: var(--text);
      font-size: .9rem; outline: none; font-family: inherit; cursor: pointer;
    }
    select:focus { border-color: var(--accent); }
    textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px; color: var(--text);
      font-size: .88rem; font-family: 'Inter', monospace; resize: vertical;
      outline: none; min-height: 100px; transition: border-color .2s;
    }
    textarea:focus { border-color: var(--accent); }

    /* List */
    .eval-list { display: flex; flex-direction: column; gap: 12px; }
    .eval-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color .2s;
    }
    .eval-item:hover { border-color: var(--accent); }
    .eval-item .title { font-weight: 500; font-size: .92rem; margin-bottom: 4px; }
    .eval-item .meta { font-size: .78rem; color: var(--muted); }
    .badge {
      font-size: .72rem; font-weight: 600; padding: 3px 10px;
      border-radius: 99px; white-space: nowrap;
    }
    .badge.PENDING    { background: rgba(251,191,36,.15); color: #fbbf24; }
    .badge.PROCESSING { background: rgba(124,106,255,.15); color: var(--accent2); }
    .badge.COMPLETED  { background: rgba(34,211,165,.15); color: var(--success); }
    .badge.FAILED     { background: rgba(248,113,113,.15); color: var(--danger); }

    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: .9rem; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.2); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <div class="logo">LLM <span>Judge</span></div>
  <div class="nav-user" id="navUser" style="display:none">
    <span id="userBadge">...</span>
    <button id="logoutBtn" onclick="logout()">Đăng xuất</button>
  </div>
</nav>

<!-- ── AUTH PANEL ── -->
<main id="authMain">
  <div class="hero">
    <h1>LLM-as-a-Judge</h1>
    <p>Platform chấm điểm tự động với Multi-Agent AI.<br/>Đăng ký hoặc đăng nhập để bắt đầu.</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin"    onclick="switchTab('login')">Đăng nhập</button>
      <button class="tab"        id="tabRegister" onclick="switchTab('register')">Đăng ký</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="loginPass">Mật khẩu</label>
        <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Đăng nhập</button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label for="regName">Họ tên (tùy chọn)</label>
        <input id="regName" type="text" placeholder="Nguyễn Văn A" />
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input id="regEmail" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="regPass">Mật khẩu (ít nhất 8 ký tự)</label>
        <input id="regPass" type="password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <button class="btn" id="registerBtn" onclick="doRegister()">Tạo tài khoản</button>
    </div>
  </div>
</main>

<!-- ── DASHBOARD ── -->
<div id="dashboard" class="hidden">
  <div class="dash-header">
    <h2>📋 Dashboard</h2>
    <p>Quản lý các yêu cầu chấm điểm của bạn</p>
  </div>

  <div class="grid2">
    <div class="stat-card">
      <div class="val" id="statTotal">—</div>
      <div class="lbl">Tổng yêu cầu</div>
    </div>
    <div class="stat-card">
      <div class="val" id="statPending">—</div>
      <div class="lbl">Đang chờ xử lý</div>
    </div>
  </div>

  <!-- Submit new -->
  <div class="submit-card">
    <div class="section-title">➕ Gửi yêu cầu chấm điểm mới</div>
    <div id="submitAlert" class="alert"></div>
    <div class="form-group">
      <label>Tiêu đề</label>
      <input id="eTitle" type="text" placeholder="Bài luận về biến đổi khí hậu..." />
    </div>
    <div class="form-group">
      <label>Loại nội dung</label>
      <select id="eType">
        <option value="ESSAY">📝 ESSAY — Bài luận</option>
        <option value="CODE">💻 CODE — Đoạn code</option>
        <option value="QA">❓ QA — Hỏi & Đáp</option>
        <option value="GENERAL">🔍 GENERAL — Tổng quát</option>
      </select>
    </div>
    <div class="form-group">
      <label>Nội dung cần chấm điểm</label>
      <textarea id="eContent" placeholder="Dán nội dung bài luận / đoạn code / câu hỏi vào đây..."></textarea>
    </div>
    <div class="form-group">
      <label>Rubric / Tiêu chí chấm (tùy chọn)</label>
      <textarea id="eRubric" style="min-height:70px" placeholder="Ví dụ: Chấm theo ngữ pháp (4đ), mạch lạc (3đ), từ vựng (3đ)..."></textarea>
    </div>
    <button class="btn" id="submitBtn" onclick="submitEval()">Gửi yêu cầu</button>
  </div>

  <!-- List -->
  <div class="section-title">📂 Danh sách yêu cầu của bạn</div>
  <div id="evalList" class="eval-list">
    <div class="empty">Đang tải...</div>
  </div>
  <div style="text-align:center;margin-top:20px">
    <button class="btn" id="loadMoreBtn" style="width:auto;padding:10px 28px;background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="loadMore()" class="hidden">Tải thêm</button>
  </div>
</div>

<script>
  const API = 'http://localhost:8000/api/v1';
  let token = localStorage.getItem('llmj_token') || '';
  let currentPage = 1;
  let totalPages = 1;

  // ── INIT ──
  window.addEventListener('DOMContentLoaded', () => {
    if (token) initDashboard();
  });

  // ── TAB SWITCH ──
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    hideAlert();
  }

  // ── ALERTS ──
  function showAlert(msg, type = 'error', id = 'alertBox') {
    const el = document.getElementById(id);
    el.textContent = msg; el.className = `alert ${type}`;
    el.style.display = 'block';
  }
  function hideAlert(id = 'alertBox') {
    const el = document.getElementById(id);
    el.style.display = 'none';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) { btn._orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true; }
    else { btn.innerHTML = btn._orig; btn.disabled = false; }
  }

  // ── REGISTER ──
  async function doRegister() {
    hideAlert();
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    if (!email || !pass) return showAlert('Vui lòng điền đầy đủ email và mật khẩu.');
    if (pass.length < 8)  return showAlert('Mật khẩu cần ít nhất 8 ký tự.');

    setLoading('registerBtn', true);
    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass, full_name: name || null }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Đăng ký thất bại.');
      showAlert(`✅ Đăng ký thành công! Chào mừng ${data.full_name || data.email}. Bạn có thể đăng nhập ngay.`, 'success');
      setTimeout(() => switchTab('login'), 1500);
    } catch (e) {
      showAlert(e.message);
    } finally {
      setLoading('registerBtn', false);
    }
  }

  // ── LOGIN ──
  async function doLogin() {
    hideAlert();
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) return showAlert('Vui lòng điền email và mật khẩu.');

    setLoading('loginBtn', true);
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}`,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Sai email hoặc mật khẩu.');
      token = data.access_token;
      localStorage.setItem('llmj_token', token);
      await initDashboard();
    } catch (e) {
      showAlert(e.message);
    } finally {
      setLoading('loginBtn', false);
    }
  }

  // ── LOGOUT ──
  function logout() {
    token = ''; localStorage.removeItem('llmj_token');
    document.getElementById('authMain').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('navUser').style.display = 'none';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPass').value = '';
  }

  // ── DASHBOARD ──
  async function initDashboard() {
    try {
      const me = await apiFetch('/users/me');
      document.getElementById('userBadge').textContent = me.email;
      document.getElementById('navUser').style.display = 'flex';
      document.getElementById('authMain').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      currentPage = 1;
      await loadEvals(true);
    } catch {
      logout();
    }
  }

  async function loadEvals(reset = false) {
    if (reset) currentPage = 1;
    const data = await apiFetch(`/evaluations/?page=${currentPage}&page_size=10`);
    totalPages = data.total_pages;
    document.getElementById('statTotal').textContent = data.total;

    const pending = data.items.filter(i => i.status === 'PENDING' || i.status === 'PROCESSING').length;
    document.getElementById('statPending').textContent = pending;

    const list = document.getElementById('evalList');
    if (reset) list.innerHTML = '';

    if (data.items.length === 0 && reset) {
      list.innerHTML = '<div class="empty">Chưa có yêu cầu nào. Hãy gửi yêu cầu đầu tiên của bạn! 🚀</div>';
    } else {
      data.items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'eval-item';
        div.innerHTML = `
          <div>
            <div class="title">${escHtml(item.title)}</div>
            <div class="meta">${item.content_type} · ${fmtDate(item.created_at)}</div>
          </div>
          <span class="badge ${item.status}">${item.status}</span>`;
        list.appendChild(div);
      });
    }

    const btn = document.getElementById('loadMoreBtn');
    btn.style.display = currentPage < totalPages ? 'inline-block' : 'none';
  }

  async function loadMore() {
    currentPage++;
    await loadEvals(false);
  }

  // ── SUBMIT EVAL ──
  async function submitEval() {
    hideAlert('submitAlert');
    const title   = document.getElementById('eTitle').value.trim();
    const content = document.getElementById('eContent').value.trim();
    const ctype   = document.getElementById('eType').value;
    const rubric  = document.getElementById('eRubric').value.trim();

    if (!title)   return showAlert('Vui lòng nhập tiêu đề.', 'error', 'submitAlert');
    if (!content) return showAlert('Vui lòng nhập nội dung cần chấm.', 'error', 'submitAlert');

    setLoading('submitBtn', true);
    try {
      await apiFetch('/evaluations/', {
        method: 'POST',
        body: JSON.stringify({ title, content_type: ctype, content, rubric: rubric || null }),
      });
      showAlert('✅ Gửi thành công! Yêu cầu đang chờ xử lý.', 'success', 'submitAlert');
      document.getElementById('eTitle').value = '';
      document.getElementById('eContent').value = '';
      document.getElementById('eRubric').value = '';
      await loadEvals(true);
    } catch (e) {
      showAlert(e.message, 'error', 'submitAlert');
    } finally {
      setLoading('submitBtn', false);
    }
  }

  // ── UTILS ──
  async function apiFetch(path, opts = {}) {
    const res = await fetch(`${API}${path}`, {
      ...opts,
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
        ...(opts.headers || {}),
      },
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Đã xảy ra lỗi.');
    return data;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleString('vi-VN', { dateStyle:'short', timeStyle:'short' });
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('loginForm').classList.contains('hidden'))    doLogin();
    if (!document.getElementById('registerForm').classList.contains('hidden')) doRegister();
  });
</script>
</body>
</html>
